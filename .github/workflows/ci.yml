name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Compile and generate RTL
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('build.sc') }}-${{ hashFiles('rocket-chip/build.sc') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Install Mill 0.11.7
        run: |
          curl -fL https://github.com/com-lihaoyi/mill/releases/download/0.11.7/0.11.7 -o mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill

      - name: Verify Mill
        run: mill --version

      - name: Compile SoC
        run: mill soc.compile

      - name: Verify memory map output
        run: |
          output=$(mill soc.runMain config.RV64SoCTop 2>&1)
          echo "$output"
          echo "$output" | grep -q "rv64-soc-platform" && echo "Memory map: OK"
